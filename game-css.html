<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>اللعبة</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body style="text-align: center;">

  <!-- اسم اللاعب -->
  <h3 id="playerName"></h3>

  <!-- النقاط -->
 <p>⭐ النقاط: <span id="score">0</span></p>

  <!-- الوقت -->
  <p>⏱️ الوقت المتبقي: <span id="timer">30</span> ثانية</p>

  <!-- السؤال -->
  <h2 id="question">السؤال هنا</h2>

  <!-- Hint -->
  <p>💡 رتب البلوكات لتكوين الكود الصحيح</p>

  <!-- البلوكات (فاضية، JS يعبيها) -->
  <div id="blocks"></div>

  <!-- منطقة السحب -->
  <h3>اسحب البلوكات هنا:</h3>
  <div id="drop-area"></div>

  <br>

  <!-- الأزرار -->
  <button onclick="retry()">🔄 إعادة المحاولة</button>
  <button onclick="finish()">✅ انتهيت</button>

  <br><br>

  <button onclick="location.href='language.html'">⬅ رجوع</button>

  <!-- مكتبة السحب (مهم جدًا) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <!-- ملف الجافاسكربت -->
  <script src="script.js"></script>

</body>
</html>
